<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Намаз сағаты — Солнечные часы намаза</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#10172e;font-family:'Segoe UI',Inter,Arial,sans-serif}
#scene{position:fixed;inset:0}
.panel{
  position:fixed;top:12px;left:12px;width:300px;
  background:rgba(255,248,235,0.94);backdrop-filter:blur(12px);
  border:1px solid #e8d8b0;border-radius:16px;padding:14px 16px;
  z-index:10;max-height:calc(100vh - 24px);overflow-y:auto;
  box-shadow:0 4px 32px rgba(0,0,0,0.18)
}
h1{font-size:16px;font-weight:700;color:#1a1006;margin-bottom:2px}
.sub{font-size:11px;color:#9a7a3a;margin-bottom:10px}
.clock{text-align:center;padding:8px 0 10px}
.clock .t{font-size:38px;font-weight:700;color:#142033;letter-spacing:2px;line-height:1}
.clock .d{font-size:12px;color:#7a6a4a;margin-top:3px}
.row{display:flex;align-items:center;justify-content:space-between;margin:5px 0;gap:8px}
.row label{font-size:12px;color:#7a6a4a;white-space:nowrap}
input[type=range]{flex:1;accent-color:#9a6a12}
input[type=number],input[type=date],select{
  font-size:12px;border:1px solid #d8c890;border-radius:6px;
  padding:4px 6px;background:#fffbf0;color:#1a1006;width:100%
}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:4px 0}
.play{display:flex;align-items:center;gap:8px;margin:8px 0}
.play button,.now{
  padding:7px 14px;border-radius:9px;border:none;cursor:pointer;font-size:12px;
  font-weight:600;background:#9a6a12;color:#fff;transition:background .2s
}
.play button:hover,.now:hover{background:#7a5010}
.play button.on{background:#3a5a8c}
.speed{font-size:10px;color:#9a7a3a}
hr{border:none;border-top:1px solid #e8d8b0;margin:8px 0}
.ptime{display:flex;align-items:center;gap:7px;padding:5px 0;border-radius:6px;transition:background .15s}
.ptime.active{background:#fff3d0;padding-left:6px;margin:-2px -6px;padding-right:6px}
.ptime.dim{opacity:.6}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nm{flex:1;font-size:12px;font-weight:600;color:#1a1006}
.kz{font-weight:400;color:#8a7a5a;font-size:11px}
.vv{font-size:13px;font-weight:700;color:#2a4060;font-variant-numeric:tabular-nums}
.note{font-size:10px;color:#9a7a3a;margin:4px 0;line-height:1.4;
  border-radius:6px;padding:4px 6px;background:#fff8e8}
#weatherBadge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;color:#5a6a7a;background:#e8f0fa;
  border-radius:20px;padding:3px 10px;margin:4px 0
}
.city-row{display:flex;gap:6px;align-items:center;margin:5px 0}
.city-row label{font-size:12px;color:#7a6a4a;white-space:nowrap}
.city-row select{flex:1}
.phead{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.toggle{display:none;flex:none;width:32px;height:32px;border:1px solid #e0d0a0;
  background:#fff;border-radius:9px;font-size:15px;color:#8a7a4a;cursor:pointer;
  line-height:1;transition:transform .2s;align-items:center;justify-content:center}
.panel.min #panelBody{display:none}
.panel.min .toggle{transform:rotate(180deg)}
.hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);font-size:11px;
  color:#ccc;background:rgba(0,0,0,0.4);padding:5px 14px;border-radius:20px;z-index:10}
@media(max-width:680px){
  .panel{width:auto;left:8px;right:8px;top:auto;bottom:8px;max-height:75vh;border-radius:14px}
  .toggle{display:flex}
  .clock .t{font-size:28px}
  .hint{display:none}
}
</style>
</head>
<body>
<div id="scene"></div>

<div class="panel" id="panel">
  <div class="phead">
    <div>
      <h1>&#127796; Намаз сағаты</h1>
      <div class="sub">Тень пальмы показывает время намаза</div>
    </div>
    <button class="toggle" id="toggle">&#9662;</button>
  </div>

  <div class="clock">
    <div class="t" id="clockT">12:00</div>
    <div class="d" id="clockD"></div>
    <div style="margin-top:6px"><span id="weatherBadge" style="display:none"></span></div>
    <button class="now" id="nowBtn" style="margin-top:6px">Сейчас</button>
  </div>

  <div id="panelBody">
  <div class="row"><label>Время</label><input type="range" id="time" min="0" max="1439" value="720" step="1"></div>
  <div class="play">
    <button id="playBtn">&#9654; День</button>
    <span class="speed" id="speedLbl"></span>
  </div>

  <hr>
  <div class="city-row">
    <label>Город</label>
    <select id="citySelect"></select>
  </div>
  <div class="row"><label>Дата</label><input type="date" id="date"></div>
  <div class="grid2">
    <div><label style="font-size:11px;color:#9a7a3a">Широта</label><input type="number" id="lat" value="51.23" step="0.01"></div>
    <div><label style="font-size:11px;color:#9a7a3a">Долгота</label><input type="number" id="lon" value="51.37" step="0.01"></div>
  </div>
  <div class="grid2" style="margin-top:6px">
    <div><label style="font-size:11px;color:#9a7a3a">Часовой пояс</label><input type="number" id="tz" value="5" step="0.5"></div>
    <div><label style="font-size:11px;color:#9a7a3a">Аср</label>
      <select id="asr"><option value="2">Ханафи</option><option value="1">Стандарт</option></select></div>
  </div>
  <div class="row" style="margin-top:6px">
    <label style="min-width:auto;font-size:11px;color:#9a7a3a">Сумерки</label>
    <select id="method" style="flex:1">
      <option value="18,17">18°/17° (стандарт)</option>
      <option value="16,15">16°/15°</option>
      <option value="15,15">15°/15°</option>
      <option value="19,17">19°/17°</option>
    </select>
  </div>

  <hr>
  <div class="times" id="times"></div>
  <div id="hilatNote" style="display:none" class="note"></div>
  <div class="note">&#9888;&#65039; Расчёт приблизительный (±неск. мин). Сверяйтесь с официальным календарём.</div>
  </div>
</div>

<div class="hint">тяни — поворот &middot; колесо — зум</div>

<script>
'use strict';
// ============================================================

// ============================================================
//  ASTRONOMY (NOAA-based)
// ============================================================
const D2R=Math.PI/180, R2D=180/Math.PI;
const sinD=d=>Math.sin(d*D2R), cosD=d=>Math.cos(d*D2R), tanD=d=>Math.tan(d*D2R);
const asinD=x=>R2D*Math.asin(Math.max(-1,Math.min(1,x)));
const acosD=x=>R2D*Math.acos(Math.max(-1,Math.min(1,x)));
const acotD=x=>R2D*Math.atan(1/x);

function julianDay(y,m,d){
  if(m<=2){y--;m+=12;}
  const A=Math.floor(y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+B-1524.5;
}
function solarParams(jd){
  const Dd=jd-2451545, g=(357.529+0.98560028*Dd)%360, q=(280.459+0.98564736*Dd)%360;
  const L=(q+1.915*sinD(g)+0.020*sinD(2*g))%360, e=23.439-0.00000036*Dd;
  const RA=R2D*Math.atan2(cosD(e)*sinD(L),cosD(L))/15;
  const decl=asinD(sinD(e)*sinD(L));
  let EqT=q/15-((RA%24)+24)%24; EqT=((EqT+12)%24)-12;
  return {decl,EqT:EqT*60};
}
function solarNoon(EqT,lon,tz){return (720-4*lon-EqT)/60+tz;}
function timeForAngle(angle,lat,decl,EqT,lon,tz,dir){
  const c=(sinD(angle)-sinD(lat)*sinD(decl))/(cosD(lat)*cosD(decl));
  if(c>1||c<-1)return null;
  return solarNoon(EqT,lon,tz)+dir*acosD(c)/15;
}
function asrTime(f,lat,decl,EqT,lon,tz){
  return timeForAngle(acotD(f+tanD(Math.abs(lat-decl))),lat,decl,EqT,lon,tz,+1);
}
function computePrayers(y,m,d,lat,lon,tz,fajrA,ishaA,asrF){
  const jd=julianDay(y,m,d)+(12-lon/15)/24;
  const {decl,EqT}=solarParams(jd);
  const noon=solarNoon(EqT,lon,tz);
  let fajr=timeForAngle(-fajrA,lat,decl,EqT,lon,tz,-1);
  const sunrise=timeForAngle(-0.833,lat,decl,EqT,lon,tz,-1);
  const maghrib=timeForAngle(-0.833,lat,decl,EqT,lon,tz,+1);
  let isha=timeForAngle(-ishaA,lat,decl,EqT,lon,tz,+1);
  let hiLat=false;
  if((fajr===null||isha===null)&&sunrise!==null&&maghrib!==null){
    const night=(sunrise+24)-maghrib, seg=night/7;
    if(fajr===null)fajr=sunrise-seg;
    if(isha===null)isha=maghrib+seg;
    hiLat=true;
  }
  return {fajr,sunrise,dhuhr:noon,asr:asrTime(asrF,lat,decl,EqT,lon,tz),
          maghrib,isha,decl,EqT,hiLat};
}
function sunAltAz(t,lat,decl,EqT,lon,tz){
  const solarMin=t*60+EqT+4*(lon-15*tz), H=(solarMin/60-12)*15;
  const alt=asinD(sinD(lat)*sinD(decl)+cosD(lat)*cosD(decl)*cosD(H));
  let az=acosD((sinD(decl)-sinD(alt)*sinD(lat))/(cosD(alt)*cosD(lat)));
  if(H>0)az=360-az;
  return {alt,az};
}

// ============================================================
//  PRAYER META
// ============================================================
const PRAYERS=[
  {key:'fajr',   nm:'Фаджр',  kz:'Таң',       col:'#7a5cff', night:true},
  {key:'sunrise',nm:'Восход', kz:'Күншығыс',   col:'#e0a23a', sep:true},
  {key:'dhuhr',  nm:'Зухр',   kz:'Бесін',      col:'#e0a23a'},
  {key:'asr',    nm:'Аср',    kz:'Екінді',     col:'#d9772f'},
  {key:'maghrib',nm:'Магриб', kz:'Ақшам',      col:'#c0506b'},
  {key:'isha',   nm:'Иша',    kz:'Құптан',     col:'#3a4a8c', night:true},
];
const fmt=h=>{if(h==null)return'--:--';h=((h%24)+24)%24;
  let H=Math.floor(h),M=Math.round((h-H)*60);if(M===60){M=0;H=(H+1)%24;}
  return String(H).padStart(2,'0')+':'+String(M).padStart(2,'0');};

// ============================================================
//  WEATHER
// ============================================================
let wx={code:0,rain:false,storm:false,snow:false,cloudy:false,heavy:false};
let wxLastFetch=0;

function wmoInterpret(code){
  return {
    rain  :(code>=51&&code<=67)||(code>=80&&code<=82)||code>=95,
    storm :code>=95,
    snow  :(code>=71&&code<=77)||(code>=85&&code<=86),
    fog   :code===45||code===48,
    cloudy:code>=1,
    heavy :(code>=63&&code<=65)||(code>=81&&code<=82)||code>=96,
  };
}
async function fetchWeather(lat,lon){
  const now=Date.now();
  if(now-wxLastFetch<600000)return;
  wxLastFetch=now;
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(3)}&longitude=${lon.toFixed(3)}&current=weather_code,precipitation&timezone=auto`;
    const resp=await fetch(url);
    if(!resp.ok)return;
    const data=await resp.json();
    const code=data.current&&data.current.weather_code!=null?data.current.weather_code:0;
    wx=Object.assign({code},wmoInterpret(code));
    updateWeatherBadge();
  }catch(e){}
}
function wmoLabel(code){
  if(code===0)return '☀️ Ясно';
  if(code<=2)return '🌤 Переменная облачность';
  if(code===3)return '☁️ Пасмурно';
  if(code<=48)return '🌫 Туман';
  if(code<=57)return '🌦 Морось';
  if(code<=67)return '🌧 Дождь';
  if(code<=77)return '❄️ Снег';
  if(code<=82)return '🌧 Ливень';
  if(code<=99)return '⛈ Гроза';
  return 'Код '+code;
}
function updateWeatherBadge(){
  const b=document.getElementById('weatherBadge');
  b.style.display='inline-flex';
  b.textContent=wmoLabel(wx.code);
}

// ============================================================
//  RENDERER
// ============================================================
const host=document.getElementById('scene');
let renderer;
try{
  renderer=new THREE.WebGLRenderer({antialias:true});
}catch(e){
  document.body.innerHTML='<div style="color:#fff;padding:40px;text-align:center">Браузер не поддерживает 3D. Откройте в Chrome или Safari.</div>';
  throw e;
}
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
host.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(46,innerWidth/innerHeight,0.1,2000);
const isMobile=matchMedia('(max-width:680px)').matches||('ontouchstart' in window);

// --- orbit ---
let camR=26, camTheta=Math.PI*0.62, camPhi=0.82;
const camTarget=new THREE.Vector3(0,0,0);
function placeCam(){
  camera.position.set(
    camTarget.x+camR*Math.sin(camPhi)*Math.cos(camTheta),
    camTarget.y+camR*Math.cos(camPhi),
    camTarget.z+camR*Math.sin(camPhi)*Math.sin(camTheta));
  camera.lookAt(camTarget);
}
const cvs=renderer.domElement; cvs.style.touchAction='none';
let drag=false,px=0,py=0;
function orbitTo(x,y){camTheta-=(x-px)*0.008;camPhi-=(y-py)*0.008;
  camPhi=Math.max(0.18,Math.min(1.42,camPhi));px=x;py=y;placeCam();}
function zoomBy(d){camR=Math.max(10,Math.min(80,camR+d));placeCam();}
cvs.addEventListener('pointerdown',e=>{if(e.pointerType==='touch')return;drag=true;px=e.clientX;py=e.clientY;});
addEventListener('pointerup',e=>{if(e.pointerType==='touch')return;drag=false;});
addEventListener('pointermove',e=>{if(e.pointerType==='touch'||!drag)return;orbitTo(e.clientX,e.clientY);});
cvs.addEventListener('wheel',e=>{e.preventDefault();zoomBy(e.deltaY*0.02);},{passive:false});
let pinch=0;
const tdist=t=>Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
cvs.addEventListener('touchstart',e=>{
  if(e.touches.length===1){drag=true;px=e.touches[0].clientX;py=e.touches[0].clientY;}
  else if(e.touches.length>=2){drag=false;pinch=tdist(e.touches);}
},{passive:false});
cvs.addEventListener('touchmove',e=>{e.preventDefault();
  if(e.touches.length===1&&drag)orbitTo(e.touches[0].clientX,e.touches[0].clientY);
  else if(e.touches.length>=2){const d=tdist(e.touches);zoomBy((pinch-d)*0.06);pinch=d;}
},{passive:false});
cvs.addEventListener('touchend',e=>{
  if(e.touches.length===0)drag=false;
  else if(e.touches.length===1){drag=true;px=e.touches[0].clientX;py=e.touches[0].clientY;}
},{passive:false});

// ============================================================
//  LIGHTS
// ============================================================
const ambient=new THREE.HemisphereLight(0xfff5e0,0x886644,0.5); scene.add(ambient);
const sunLight=new THREE.DirectionalLight(0xfff2da,1.8);
sunLight.castShadow=true;
sunLight.shadow.mapSize.set(isMobile?1024:2048,isMobile?1024:2048);
const sc=sunLight.shadow.camera;
sc.near=1;sc.far=100;sc.left=-15;sc.right=15;sc.top=15;sc.bottom=-15;
sunLight.shadow.bias=-0.0004; sunLight.shadow.normalBias=0.03;
scene.add(sunLight); scene.add(sunLight.target);

const moonLight=new THREE.DirectionalLight(0x8899cc,0);
scene.add(moonLight); scene.add(moonLight.target);

const lightningLight=new THREE.PointLight(0xffffff,0,80);
lightningLight.position.set(0,30,0); scene.add(lightningLight);

// fog
scene.fog=new THREE.FogExp2(0x9fc6ee,0.012);

// ============================================================
//  OCEAN
// ============================================================
const OCEAN_SEGS=isMobile?40:60;
const oceanGeo=new THREE.PlaneGeometry(180,180,OCEAN_SEGS,OCEAN_SEGS);
oceanGeo.rotateX(-Math.PI/2);
// cache original XZ for wave calc
const oceanOrigY=new Float32Array(oceanGeo.attributes.position.count);
const oceanX=new Float32Array(oceanGeo.attributes.position.count);
const oceanZ=new Float32Array(oceanGeo.attributes.position.count);
{const p=oceanGeo.attributes.position;
  for(let i=0;i<p.count;i++){
    oceanX[i]=p.getX(i); oceanOrigY[i]=0; oceanZ[i]=p.getZ(i);
  }
}
const oceanMat=new THREE.MeshStandardMaterial({
  color:0x1a6080,roughness:0.15,metalness:0.08,
  transparent:true,opacity:0.88,
});
const ocean=new THREE.Mesh(oceanGeo,oceanMat); ocean.receiveShadow=true;
ocean.position.y=-0.28; scene.add(ocean);

function barkTexture(){
  const c=document.createElement('canvas'); c.width=128;c.height=256;
  const g=c.getContext('2d');
  g.fillStyle='#6f4a29'; g.fillRect(0,0,128,256);
  const cols=5,rows=13,dw=128/cols,dh=256/rows;
  for(let r=0;r<rows;r++) for(let i=0;i<=cols;i++){
    const x=i*dw+(r%2?dw/2:0),y=r*dh+dh/2,s=dw*0.44;
    g.save();g.translate(x,y);g.rotate(Math.PI/4);
    g.fillStyle='#7d542f';g.fillRect(-s,-s,2*s,2*s);
    g.fillStyle='#8c6036';g.fillRect(-s,-s,2*s,s*0.85);
    g.strokeStyle='#412815';g.lineWidth=2;g.strokeRect(-s,-s,2*s,2*s);
    g.restore();
  }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping;
  t.repeat.set(3,7); t.anisotropy=4; return t;
}

function taperedTube(curve,segs,radial,rfn){
  const pts=curve.getSpacedPoints(segs),fr=curve.computeFrenetFrames(segs,false);
  const pos=[],uv=[],idx=[];
  for(let i=0;i<=segs;i++){
    const t=i/segs,C=pts[i],N=fr.normals[i],B=fr.binormals[i],r=rfn(t);
    for(let j=0;j<=radial;j++){
      const a=j/radial*Math.PI*2,cx=Math.cos(a),sx=Math.sin(a);
      pos.push(C.x+r*(cx*N.x+sx*B.x),C.y+r*(cx*N.y+sx*B.y),C.z+r*(cx*N.z+sx*B.z));
      uv.push(j/radial,t*4);
    }
  }
  for(let i=0;i<segs;i++) for(let j=0;j<radial;j++){
    const a=i*(radial+1)+j,b=a+radial+1; idx.push(a,b,a+1,b,b+1,a+1);
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  geo.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2));
  geo.setIndex(idx); geo.computeVertexNormals(); return geo;
}

function makeFrond(len){
  const grp=new THREE.Group();
  const arch=new THREE.CatmullRomCurve3([
    new THREE.Vector3(0,0,0), new THREE.Vector3(len*0.3,len*0.2,0),
    new THREE.Vector3(len*0.62,len*0.18,0), new THREE.Vector3(len*0.85,len*0.02,0),
    new THREE.Vector3(len,-len*0.24,0)]);
  const rachis=new THREE.Mesh(taperedTube(arch,22,5,t=>0.052*(1-0.8*t)),
    new THREE.MeshStandardMaterial({color:0x5d6e2c,roughness:.85}));
  rachis.castShadow=true; grp.add(rachis);
  const pos=[],idx=[]; let v=0; const NL=28,UP=new THREE.Vector3(0,1,0);
  for(let k=2;k<NL;k++){
    const t=k/NL,P=arch.getPointAt(t),T=arch.getTangentAt(t).normalize();
    const leafLen=(1-0.55*t)*len*0.27,w=leafLen*0.14,pitch=0.6-0.28*t;
    for(const side of[-1,1]){
      const S=new THREE.Vector3(0,0,side);
      const dir=new THREE.Vector3().addScaledVector(S,Math.cos(pitch))
        .addScaledVector(UP,Math.sin(pitch)).addScaledVector(T,0.4).normalize();
      let zc=T.clone().addScaledVector(dir,-T.dot(dir));
      if(zc.lengthSq()<1e-5)zc.set(0,0,1); zc.normalize();
      const bl=P.clone().addScaledVector(zc,-w/2),br=P.clone().addScaledVector(zc,w/2),
            tp=P.clone().addScaledVector(dir,leafLen);
      tp.y-=leafLen*0.14;
      pos.push(bl.x,bl.y,bl.z,br.x,br.y,br.z,tp.x,tp.y,tp.z);
      idx.push(v,v+1,v+2); v+=3;
    }
  }
  const lg=new THREE.BufferGeometry();
  lg.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  lg.setIndex(idx); lg.computeVertexNormals();
  const leaves=new THREE.Mesh(lg,new THREE.MeshStandardMaterial(
    {color:0x4e8233,roughness:.7,metalness:0,side:THREE.DoubleSide}));
  leaves.castShadow=true; grp.add(leaves); return grp;
}

function readInputs(){
  const dv=el('date').value.split('-').map(Number);
  day={y:dv[0],m:dv[1],d:dv[2]};
  const lat=+el('lat').value, lon=+el('lon').value, tz=+el('tz').value;
  const [fa,is]=el('method').value.split(',').map(Number);
  const asrF=+el('asr').value;
  P=computePrayers(day.y,day.m,day.d,lat,lon,tz,fa,is,asrF);
  decl=P.decl; EqT=P.EqT; window._loc={lat,lon,tz};

  const items=[];
  PRAYERS.filter(p=>!p.sep).forEach(p=>{
    const t=P[p.key],o=markerObjs[p.key];
    if(t==null){o.grp.visible=false;return;}
    o.grp.visible=true;
    const {az}=sunAltAz(t,lat,decl,EqT,lon,tz);
    items.push({az:((az+180)%360+360)%360,o});
  });
  items.sort((a,b)=>a.az-b.az);
  const minGap=34;
  for(let it=0;it<80;it++){
    for(let i=0;i<items.length;i++){
      const j=(i+1)%items.length;
      let gap=items[j].az-items[i].az; if(j===0)gap+=360;
      if(gap<minGap){const push=(minGap-gap)/2;
        items[i].az=(items[i].az-push+360)%360;
        items[j].az=(items[j].az+push)%360;}
    }
    items.sort((a,b)=>a.az-b.az);
  }
  items.forEach(it=>{const pos=azToPos(it.az,MARK_R);it.o.grp.position.set(pos.x,0,pos.z);});
  renderTimes();
  el('hilatNote').style.display=P.hiLat?'block':'none';
  if(P.hiLat)el('hilatNote').innerHTML='ℹ️ Высокая широта: Фаджр и Иша по методу «1/7 ночи».';
  fetchWeather(lat,lon);
}

function renderTimes(){
  const box=el('times'); box.innerHTML='';
  const t=+el('time').value/60, active=activePrayer(t);
  PRAYERS.forEach(p=>{
    const row=document.createElement('div');
    row.className='ptime'+(p.key===active?' active':'')+(p.sep?' dim':'');
    row.innerHTML='<span class="dot" style="background:'+p.col+'"></span>'
      +'<span class="nm">'+p.nm+' <span class="kz">&middot; '+p.kz+'</span></span>'
      +'<span class="vv">'+fmt(P[p.key])+'</span>';
    box.appendChild(row);
  });
}

function activePrayer(t){
  const seq=['fajr','dhuhr','asr','maghrib','isha'];
  let cur='isha';
  for(const k of seq){if(P[k]!=null&&t>=P[k])cur=k;}
  if(P.fajr!=null&&t<P.fajr)cur='isha';
  return cur;
}

const skyNoon=new THREE.Color(0xbfe0f5), skyDay=new THREE.Color(0x9fc6ee),
      skyGold=new THREE.Color(0xf0a860), skyDusk=new THREE.Color(0x5b4a7a),
      skyNight=new THREE.Color(0x080e20);
function skyColor(alt){
  const c=new THREE.Color();
  if(alt>12)c.copy(skyNoon).lerp(skyDay,Math.min(1,(40-alt)/40));
  else if(alt>2)c.copy(skyGold).lerp(skyDay,(alt-2)/10);
  else if(alt>-6)c.copy(skyDusk).lerp(skyGold,(alt+6)/8);
  else c.copy(skyNight).lerp(skyDusk,Math.max(0,(alt+12)/6));
  return c;
}

//  MAIN UPDATE
// ============================================================
let simTime=0;

function update(dt){
  simTime+=dt;
  const t=+el('time').value/60;
  const {lat,lon,tz}=window._loc;
  const {alt,az}=sunAltAz(t,lat,decl,EqT,lon,tz);

  // sun
  const dist=90, up=Math.max(alt,-30);
  const sunDir=new THREE.Vector3(
    Math.cos(up*D2R)*Math.sin(az*D2R),
    Math.sin(up*D2R),
   -Math.cos(up*D2R)*Math.cos(az*D2R));
  sunLight.position.copy(sunDir.clone().multiplyScalar(dist));
  sunDisc.position.copy(sunDir.clone().multiplyScalar(85));
  sunDisc.visible=alt>-1.5;

  const dayAmt=Math.max(0,Math.min(1,(alt+2)/12));
  const nightAmt=1-dayAmt;
  sunLight.castShadow=alt>0.5;
  sunLight.intensity=0.2+1.7*dayAmt;
  ambient.intensity=0.25+0.55*dayAmt;

  // moon in sky
  const moonAz=(az+180)%360;
  moonSky.position.set(
    80*Math.cos(35*D2R)*Math.sin(moonAz*D2R),
    80*Math.sin(35*D2R),
   -80*Math.cos(35*D2R)*Math.cos(moonAz*D2R));
  moonSky.visible=nightAmt>0.05;
  moonLight.intensity=0.08+0.38*nightAmt;
  moonLight.position.copy(moonSky.position);
  moonReflMat.opacity=nightAmt*0.5;

  // sky color + fog
  const sky=skyColor(alt);
  const fogCol=sky.clone();
  if(wx.rain||wx.storm)fogCol.lerp(new THREE.Color(0x404858),0.5);
  scene.background=fogCol;
  scene.fog.color.copy(fogCol);
  scene.fog.density=wx.storm?0.022:wx.rain?0.016:0.011;

  // sand color (wet when raining, dark at night)
  const sandBase=new THREE.Color(0xc4a06a);
  sandBase.lerp(new THREE.Color(0x4a4660),nightAmt*0.45);
  if(wx.rain||wx.storm)sandBase.lerp(new THREE.Color(0x7a6040),0.55);
  sandMat.color.copy(sandBase);

  // ocean waves
  updateWaves(simTime);
  const oceanBase=new THREE.Color(0x1a6080);
  oceanBase.lerp(new THREE.Color(0x0e1820),nightAmt*0.75);
  if(wx.storm)oceanBase.lerp(new THREE.Color(0x181e28),0.4);
  oceanMat.color.copy(oceanBase);
  oceanMat.emissive=new THREE.Color(0x102030);
  oceanMat.emissiveIntensity=nightAmt*0.18;

  // stars
  const starAmt=Math.max(0,Math.min(1,(-alt-2)/6))*(wx.rain||wx.storm||wx.cloudy?0.2:1);
  starMat.opacity=starAmt;
  starRefMat.opacity=starAmt*0.2;

  // clouds
  cloudObjs2.forEach((c,i)=>{
    const targetOp=c.dark
      ?(wx.storm?0.82:wx.rain?0.65:wx.cloudy?0.32:0)
      :(wx.storm?0.52:wx.rain?0.42:wx.cloudy?0.36:0);
    c.mat.opacity+=(targetOp-c.mat.opacity)*0.015;
    c.grp.position.x+=c.speedX;
    if(c.grp.position.x>40)c.grp.position.x=-40;
    if(c.grp.position.x<-40)c.grp.position.x=40;
  });

  // rain
  const rainTarget=wx.heavy?0.6:wx.rain||wx.storm?0.4:0;
  rainMat.opacity+=(rainTarget-rainMat.opacity)*0.04;
  if(rainMat.opacity>0.01){
    const rPos=rainGeo.attributes.position;
    for(let i=0;i<RAIN_COUNT;i++){
      rPos.array[i*3+1]-=rainVelArr[i];
      if(rPos.array[i*3+1]<-1)resetRainDrop(i);
    }
    rPos.needsUpdate=true;
  }

  // lightning
  if(wx.storm){
    lightningTimer-=dt; lightningCooldown-=dt;
    if(lightningTimer<=0&&lightningCooldown<=0){
      lightningLight.intensity=100+Math.random()*100;
      lightningTimer=0.06+Math.random()*0.1;
      lightningCooldown=3+Math.random()*9;
    }
    if(lightningTimer<=0)lightningLight.intensity*=0.65;
    if(lightningLight.intensity<0.5)lightningLight.intensity=0;
  } else {
    lightningLight.intensity*=0.75;
  }

  // active prayer glow
  const active=activePrayer(t);
  Object.entries(markerObjs).forEach(([k,o])=>{
    const on=(k===active);
    o.ring.material.opacity+=(on?0.85:0-o.ring.material.opacity)*0.12;
    o.grp.scale.setScalar(on?1+0.04*Math.sin(simTime*4.2):1);
  });

  el('clockT').textContent=fmt(t);
  el('clockD').textContent=String(day.d).padStart(2,'0')+'.'+String(day.m).padStart(2,'0')+'.'+day.y;
  renderer.render(scene,camera);
}

function updateWaves(t){
  const pos=oceanGeo.attributes.position;
  const amp=wx.storm?0.6:wx.rain?0.38:0.18;
  for(let i=0;i<pos.count;i++){
    const x=oceanX[i], z=oceanZ[i];
    if(Math.abs(x)<8&&Math.abs(z)<8){pos.setY(i,-0.28);continue;}
    const y=amp*(
      0.6*Math.sin(x*0.22+t*0.7)
     +0.35*Math.sin(z*0.28+t*0.55)
     +0.2*Math.sin((x+z)*0.15+t*1.1)
     +0.1*Math.sin(x*0.5-z*0.3+t*0.9));
    pos.setY(i,y-0.28);
  }
  pos.needsUpdate=true;
  oceanGeo.computeVertexNormals();
}

// ============================================================
//  LOOP
// ============================================================
function loop(ts){
  const dt=Math.min((ts-lastTimestamp)/1000,0.1);
  lastTimestamp=ts;
  if(playing){
    let v=+el('time').value+dt*playSpeed;
    if(v>1439)v=0;
    el('time').value=v; renderTimes();
  }
  update(dt);
  requestAnimationFrame(loop);
}

// ============================================================
//  CITY SELECTOR
// ============================================================
const citySelect=el('citySelect');
const defOpt=document.createElement('option');
defOpt.value=''; defOpt.textContent='— выбрать город —';
citySelect.appendChild(defOpt);
CITIES.forEach((c,i)=>{
  const o=document.createElement('option'); o.value=i; o.textContent=c.name;
  citySelect.appendChild(o);
});
citySelect.addEventListener('change',()=>{
  const idx=+citySelect.value;
  if(citySelect.value===''||isNaN(idx))return;
  const c=CITIES[idx];
  el('lat').value=c.lat; el('lon').value=c.lon; el('tz').value=c.tz;
  wxLastFetch=0;
  readInputs();
});

// ============================================================
//  UI WIRING
// ============================================================
function setToday(){const n=new Date();
  el('date').value=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}

el('nowBtn').onclick=()=>{const n=new Date();
  el('time').value=n.getHours()*60+n.getMinutes();
  playing=false; el('playBtn').classList.remove('on');
  el('playBtn').textContent='&#9654; День'; el('speedLbl').textContent='';
  readInputs();};

el('playBtn').onclick=()=>{playing=!playing; lastTimestamp=performance.now();
  el('playBtn').classList.toggle('on',playing);
  el('playBtn').textContent=playing?'&#10074;&#10074; Пауза':'&#9654; День';
  el('speedLbl').textContent=playing?'24ч ≈ 24с':'';};

['date','lat','lon','tz','asr','method'].forEach(id=>
  el(id).addEventListener('change',readInputs));
el('time').addEventListener('input',renderTimes);

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);});

const panel=el('panel');
el('toggle').onclick=()=>panel.classList.toggle('min');
if(isMobile){panel.classList.add('min'); camR=32;}

// URL params
const q=new URLSearchParams(location.search);
if(q.get('lat'))el('lat').value=q.get('lat');
if(q.get('lon'))el('lon').value=q.get('lon');
if(q.get('tz')) el('tz').value=q.get('tz');
if(q.get('asr'))el('asr').value=q.get('asr');
if(q.get('date'))el('date').value=q.get('date');

// pre-select city
const pLat=+el('lat').value, pLon=+el('lon').value;
const matchIdx=CITIES.findIndex(c=>Math.abs(c.lat-pLat)<0.12&&Math.abs(c.lon-pLon)<0.12);
if(matchIdx>=0)citySelect.value=matchIdx;

setToday();
const nowT=new Date(); el('time').value=nowT.getHours()*60+nowT.getMinutes();
placeCam(); readInputs(); requestAnimationFrame(loop);
</script>
